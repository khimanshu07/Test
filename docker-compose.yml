services:
  db:
    image: postgres:15-alpine
    container_name: esg_postgres
    restart: always
    environment:
      POSTGRES_DB: esg_db
      POSTGRES_USER: esg_user
      POSTGRES_PASSWORD: esg_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: esg_backend
    restart: always
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python seed.py &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://esg_user:esg_password@db:5432/esg_db
      - DEBUG=True
      - SECRET_KEY=django-insecure-production-ready-secret-key-12345
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: esg_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
